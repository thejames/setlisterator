<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Setlist-er-ator{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F0F12; --panel: #15151A; --panel2: #17171B; --panel3: #1A1A20;
      --border: #26262E; --border2: #32323C;
      --text: #ECECEE; --text2: #D6D6DA; --muted: #9A9AA2; --dim: #6E6E77;
      --faint: #5C5C64;
      --accent: #E0A33C; --green: #5BB98B; --blue: #6E9BF0; --red: #E0656B;
      --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font: 15px/1.55 'Helvetica Neue', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 0 32px 140px; }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .mono { font-family: var(--mono); }

    /* Navbar */
    .navbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; padding: 22px 0 18px; border-bottom: 1px solid var(--border);
      margin-bottom: 26px;
    }
    .brand {
      display: flex; align-items: center; gap: 9px; color: var(--text);
      font-size: 13px; letter-spacing: .14em; text-transform: uppercase;
      font-weight: 700;
    }
    .brand:hover { text-decoration: none; }
    .brand .arrow { color: var(--accent); }
    .navlinks { display: flex; gap: 18px; font-size: 13px; font-weight: 600;
      color: var(--muted); }
    .navlinks a { color: var(--muted); }
    .navlinks a:hover { color: var(--text); text-decoration: none; }

    h2 { font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text); font-weight: 600; margin: 30px 0 13px; }
    .show { font-size: 30px; font-weight: 700; letter-spacing: -.01em;
      color: #fff; margin: 0; }
    .meta { display: flex; flex-wrap: wrap; align-items: center; gap: 8px 14px;
      margin-top: 12px; color: var(--muted); font-size: 14px; }
    .meta .sep { color: #3A3A42; }
    .meta .lead { color: var(--text); font-weight: 600; }
    .hint { color: var(--dim); font-size: 13px; }
    .label { font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
      color: var(--faint); font-weight: 600; margin-bottom: 8px; }

    /* Inputs / selects / buttons */
    label { display: block; margin: 14px 0; font-weight: 600; color: var(--muted); }
    input[type=text], input:not([type]), input[type=search] {
      display: block; width: 100%; max-width: 560px; margin-top: 6px;
      padding: 10px 12px; font: inherit; color: var(--text); box-sizing: border-box;
      background: var(--panel2); border: 1px solid var(--border); border-radius: 9px;
    }
    input:focus, select:focus { outline: none; border-color: var(--blue); }
    input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent);
      cursor: pointer; }
    .title-input {
      width: 100%; max-width: none; margin: 0; padding: 0; background: transparent;
      border: none; color: #fff; font-size: 34px; font-weight: 700;
      letter-spacing: -.01em;
    }
    .header-divider { border-top: 1px solid #1C1C22; padding-top: 26px; }
    select {
      font: inherit; padding: 8px 10px; max-width: 100%; color: var(--text);
      background: var(--panel3); border: 1px solid var(--border2); border-radius: 9px;
    }
    button {
      font: inherit; font-weight: 600; cursor: pointer; border-radius: 8px;
      padding: 9px 16px; color: var(--text);
      background: var(--panel3); border: 1px solid var(--border2);
    }
    button:hover { border-color: #45454f; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    .btn-accent {
      background: var(--accent); border: none; color: #0F0F12; font-weight: 700;
      box-shadow: 0 6px 20px rgba(224,163,60,.28);
    }
    .btn-accent:hover { background: #e7af52; }
    .btn-accent:disabled { box-shadow: none; }

    /* Stat chips */
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin: 18px 0 22px; }
    .chip { display: flex; align-items: baseline; gap: 9px; padding: 11px 16px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 9px; }
    .chip b { font-family: var(--mono); font-size: 20px; font-weight: 600;
      color: var(--text); }
    .chip span { font-size: 12px; color: var(--muted); letter-spacing: .04em; }
    .chip.exact b { color: var(--green); }
    .chip.fuzzy b { color: var(--accent); }
    .chip.multi b { color: var(--blue); }
    .chip.missing b { color: var(--red); }

    /* Panels & tables */
    .panel { background: var(--panel); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; }
    table { border-collapse: collapse; width: 100%; font-size: 14px; }
    thead th, th { text-align: left; padding: 13px 18px; background: #121216;
      border-bottom: 1px solid var(--border); font-size: 11px; letter-spacing: .12em;
      text-transform: uppercase; color: var(--dim); font-weight: 600; }
    td { padding: 12px 18px; border-bottom: 1px solid #1E1E24; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .num { font-family: var(--mono); font-size: 13px; color: var(--dim);
      text-align: center; }
    .sub { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    tr.missing td { color: var(--muted); }

    /* Track table: fixed layout so long <select> options / text can't widen
       columns past the panel. Cells clip; selects fill their cell. */
    .tracktable { table-layout: fixed; }
    /* No overflow:hidden on cells — it would clip the open match dropdown.
       The .trunc spans below handle text truncation instead. */
    .tracktable select { width: 100%; max-width: 100%; }
    /* Let the dropdown escape the panel that wraps a track table. */
    .panel:has(.tracktable) { overflow: visible; }
    .trunc { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* Missing-row manual search: field + button on one row, equal height. */
    .searchrow { display: flex; align-items: stretch; gap: 8px; margin-top: 6px; }
    .searchrow .q { flex: 1; width: auto; min-width: 0; margin: 0; }
    .searchrow .go { margin: 0; flex: none; }

    /* Pills */
    .pill { display: inline-flex; align-items: center; font-size: 12px;
      font-weight: 600; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .pill-exact   { color: var(--green);  background: #5BB98B1f; border: 1px solid #5BB98B3d; }
    .pill-fuzzy   { color: var(--accent); background: #E0A33C1f; border: 1px solid #E0A33C3d; }
    .pill-multi   { color: var(--blue);   background: #6E9BF01f; border: 1px solid #6E9BF03d; }
    .pill-missing { color: var(--red);    background: #E0656B1f; border: 1px solid #E0656B3d; }

    /* Section cards (fuzzy / missing summaries) */
    .section-head { display: flex; align-items: center; gap: 10px; margin: 30px 0 13px; }
    .dot { width: 7px; height: 7px; border-radius: 999px; }
    .dot.amber { background: var(--accent); } .dot.red { background: var(--red); }
    .section-head .t { font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text); font-weight: 600; }
    .section-head .s { font-size: 13px; color: var(--dim); }
    .cards { display: flex; flex-direction: column; gap: 10px; }
    .card { display: flex; align-items: center; gap: 14px; background: var(--panel);
      border-radius: 12px; padding: 13px 18px; }
    .card-fuzzy { border: 1px solid #2A241A; border-left: 3px solid var(--accent); }
    .card-missing { border: 1px solid #2A1C1E; border-left: 3px solid var(--red); }

    /* Manual-search results (missing rows) */
    .results { margin-top: 8px; }
    .result { display: block; width: 100%; text-align: left; margin: 4px 0;
      font-weight: 400; background: var(--panel3); border: 1px solid var(--border2);
      color: var(--text); }
    .result:hover { background: var(--blue); color: #0F0F12; border-color: var(--blue); }
    .chosen { color: var(--green); font-weight: 600; }
    .miss { color: var(--red); }
    .big { font-size: 21px; font-weight: 700; color: #fff; }

    /* Fixed action bar */
    .actionbar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
      background: rgba(15,15,18,.86); backdrop-filter: blur(14px);
      border-top: 1px solid var(--border); }
    .actionbar .inner { max-width: 1180px; margin: 0 auto; padding: 14px 32px;
      display: flex; align-items: center; gap: 20px; }
    .actionbar .count b { font-family: var(--mono); font-size: 22px; font-weight: 600;
      color: #fff; }
    .actionbar .count span { font-size: 14px; color: var(--muted); margin-left: 8px; }
    .grow { flex: 1; }
    .btn-ghost { background: transparent; border: none; color: var(--muted);
      font-weight: 600; }
    .btn-ghost:hover { color: var(--text); }
    .jsonview { max-width: 1180px; margin: 0 auto 90px; padding: 16px 18px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      font-family: var(--mono); font-size: 12px; color: var(--text2);
      white-space: pre-wrap; word-break: break-all; }
    ol, ul { padding-left: 1.4rem; }

    /* Spec: URL bar in the top row */
    .urlbar { display: flex; align-items: center; gap: 10px; flex: 1;
      background: var(--panel2); border: 1px solid var(--border); border-radius: 10px;
      padding: 9px 9px 9px 14px; margin-bottom: 24px; }
    .urlbar .tag { font-family: var(--mono); font-size: 12px; color: var(--faint); }
    .urlbar input { flex: 1; min-width: 0; max-width: none; margin: 0; padding: 0;
      background: transparent; border: none; color: #B9B9C0;
      font-family: var(--mono); font-size: 13px; }
    .urlbar form { margin: 0; }
    .urlbar button { padding: 8px 16px; font-size: 13px; }

    /* Spec: custom Add checkbox (native input hidden, label is the box) */
    .addbox { display: inline-flex; cursor: pointer; }
    .addbox .inc { position: absolute; opacity: 0; width: 0; height: 0; }
    .addbox .box { width: 20px; height: 20px; border-radius: 6px; display: flex;
      align-items: center; justify-content: center; transition: all .12s;
      background: #16161B; border: 1px solid #3A3A44; color: #0F0F12;
      font-size: 12px; font-weight: 800; line-height: 1; }
    .addbox .inc:checked + .box { background: var(--accent); border-color: var(--accent); }
    .addbox .inc:not(:checked) + .box { color: transparent; }
    .addbox .inc:disabled + .box { background: var(--panel); border-color: #2A2A32;
      opacity: .4; cursor: not-allowed; }

    /* Spec: custom multi-match dropdown */
    .dropdown { position: relative; }
    .dd-btn { width: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 8px; text-align: left;
      background: var(--panel3); border: 1px solid var(--border2); border-radius: 9px;
      padding: 7px 11px; }
    .dd-btn.open { border-color: var(--blue); }
    .dd-text { min-width: 0; flex: 1; }
    .dd-title { display: block; font-size: 14px; color: var(--text); }
    .dd-sub { display: block; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .dd-caret { color: var(--muted); font-size: 11px; flex: none; }
    .dd-menu { position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 100;
      background: #1B1B21; border: 1px solid var(--border2); border-radius: 10px;
      box-shadow: 0 16px 40px rgba(0,0,0,.55); padding: 5px; }
    /* The open dropdown's cell stacks above later rows. */
    .tracktable td:has(.dd-btn.open) { position: relative; z-index: 50; }
    .dd-opt { width: 100%; text-align: left; display: block; border: none;
      background: transparent; border-radius: 7px; padding: 9px 10px; }
    .dd-opt:hover, .dd-opt.sel { background: #23232B; }

    /* Spec: richer Fuzzy / Missing section cards */
    .fuzzycard { display: grid; grid-template-columns: 1fr 22px 1fr 150px;
      align-items: center; gap: 18px; }
    .fuzzycard.rejected { opacity: .45; }
    .caplabel { font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--faint); margin-bottom: 4px; }
    .arrow-mid { text-align: center; color: var(--faint); font-size: 16px; }
    .btn-sm { font-size: 13px; padding: 8px 12px; }
    .btn-amber { background: var(--accent); border: none; color: #0F0F12; font-weight: 700; }
    .missingcard { flex-wrap: wrap; }
    .missingcard .results { flex-basis: 100%; }
    .missingcard.skipped { opacity: .4; }
    .searchpill { display: flex; align-items: center; gap: 8px; min-width: 0;
      background: #101014; border: 1px solid #2A2A32; border-radius: 8px; padding: 6px 12px; }
  </style>
</head>
<body>
  <main>
    <nav class="navbar">
      <a class="brand" href="{{ url_for('index') }}">Setlist <span class="arrow">→</span> Plex</a>
      <span class="navlinks">
        <a href="{{ url_for('index') }}">New</a>
        <a href="{{ url_for('history') }}">History</a>
        <a href="{{ url_for('buylist') }}">Buy list</a>
      </span>
    </nav>
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
