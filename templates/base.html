<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Setlist-er-ator{% endblock %}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 1040px; margin: 2rem auto; padding: 0 1rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
    h1 a { color: inherit; text-decoration: none; }
    h2 { font-size: 1.1rem; margin: 1.6rem 0 0.5rem; }
    a { color: #2563eb; }
    label { display: block; margin: 0.8rem 0; font-weight: 600; }
    input[type=text], input:not([type]) {
      display: block; width: 100%; max-width: 520px;
      margin-top: 0.25rem; padding: 0.5rem;
      font: inherit; box-sizing: border-box;
      border: 1px solid #8884; border-radius: 6px; background: #8881;
    }
    select { font: inherit; padding: 0.25rem; max-width: 100%;
      border: 1px solid #8884; border-radius: 6px; background: #8881; }
    button {
      margin-top: 0.5rem; padding: 0.55rem 1.1rem; font: inherit; font-weight: 600;
      border: 0; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .hint { color: #8889; font-size: 0.9rem; }
    .show { font-size: 1.5rem; font-weight: 600; margin: 0.2rem 0; }
    .counts { display: flex; gap: 1.2rem; font-weight: 600; margin: 1rem 0; }
    .ok, .exact td:last-child { color: #16a34a; }
    .miss { color: #dc2626; }
    .fz, .fuzzy td:last-child { color: #d97706; }
    .warn {
      background: #f59e0b22; border-left: 4px solid #f59e0b;
      padding: 0.6rem 0.9rem; border-radius: 4px;
    }
    .err { color: #dc2626; }
    table { border-collapse: collapse; width: 100%; font-size: 0.92rem; }
    th, td { text-align: left; padding: 0.35rem 0.6rem; border-bottom: 1px solid #8883; }
    th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: #8889; }
    tr.fuzzy { background: #d9770611; }
    tr.missing { background: #dc262611; opacity: 0.75; }
    ol, ul { padding-left: 1.4rem; }
    .big { font-size: 1.2rem; }
  </style>
</head>
<body>
  <h1><a href="{{ url_for('index') }}">Setlist-er-ator</a></h1>
  {% block content %}{% endblock %}
</body>
</html>
